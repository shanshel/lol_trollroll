<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Troll Roll</title>
    <meta name="description"
        content="A premium League of Legends champion randomizer. Add, remove, and lock slots to forge your perfect team.">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app" class="layout-sidebar">
        <div class="content-area">
            <header>
                <div class="header-left">
                    <h1>TROLL <span class="accent">ROLL</span></h1>
                </div>
                <div class="header-right">
                    <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Synergies">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                        <span>SYNERGIES</span>
                    </button>
                </div>
            </header>

            <main>
                <div id="slots-container" class="slots-grid">
                    <!-- Slots will be dynamically injected here -->
                    <div id="add-card" class="champion-slot add-card">
                        <div class="card-inner">
                            <div class="icon-placeholder">+</div>
                            <div class="name">ADD SLOT</div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button id="randomize-btn" class="primary-btn">
                        <span class="btn-text">RANDOMIZE UNLOCKED</span>
                    </button>
                    <button id="reset-btn" class="secondary-btn">RESET ALL</button>
                </div>
            </main>

            <footer class="main-footer">
                <div class="footer-help">
                    <p>Click to <strong>LOCK</strong> • Hover to <strong>REMOVE</strong> • Filter with <strong>TAGS</strong></p>
                </div>
                <div class="footer-actions">
                    <button id="save-team-btn" class="toolbar-btn" title="Save to Custom">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        <span>SAVE TEAM</span>
                    </button>
                    <button id="share-team-btn" class="toolbar-btn" title="Copy Share Link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                            <polyline points="16 6 12 2 8 6"></polyline>
                            <line x1="12" y1="2" x2="12" y2="15"></line>
                        </svg>
                        <span>SHARE LINK</span>
                    </button>
                </div>
            </footer>
        </div>

        <!-- Custom Save Modal -->
        <div id="save-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h3>SAVE CUSTOM TEAM</h3>
                <p>Enter a name for your masterpiece:</p>
                <input type="text" id="team-name-input" placeholder="My Team Name...">
                <div class="modal-actions">
                    <button id="confirm-save-btn" class="modal-btn primary">SAVE</button>
                    <button id="cancel-save-btn" class="modal-btn secondary">CANCEL</button>
                </div>
            </div>
        </div>

        <!-- Champion Select Modal -->
        <div id="champ-select-modal" class="modal-overlay hidden">
            <div class="modal-content champ-select-content">
                <header class="modal-header">
                    <h3>SELECT CHAMPION</h3>
                    <button id="close-champ-modal" class="close-btn">&times;</button>
                </header>
                <div class="search-container">
                    <input type="text" id="champ-search" placeholder="Search champion..." autocomplete="off">
                </div>
                <div id="champ-grid" class="champ-grid">
                    <!-- Champions will be injected here -->
                </div>
            </div>
        </div>

        <!-- Synergy Sidebar -->
        <aside id="synergy-sidebar" class="sidebar">
            <header class="sidebar-header">
                <h2>SYNERGIES</h2>
                <button id="close-sidebar-btn" class="close-btn mobile-only">×</button>
            </header>
            <div class="sidebar-content">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="preset">DYNAMIC</button>
                    <button class="tab-btn" data-tab="static">STATIC</button>
                    <button class="tab-btn" data-tab="custom">CUSTOM</button>
                </div>
                
                <div id="preset-tab" class="tab-content active">
                    <div id="preset-random-list" class="synergy-list">
                        <!-- Preset items will be injected here -->
                    </div>
                </div>
                
                <div id="static-tab" class="tab-content">
                    <div id="static-builds-list" class="synergy-list">
                        <!-- Static items will be injected here -->
                    </div>
                </div>
                
                <div id="custom-tab" class="tab-content">
                    <div class="tab-disclaimer">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        <span>Saved locally in your browser.</span>
                    </div>
                    <div id="custom-synergy-list" class="synergy-list">
                        <p class="empty-msg">No custom teams saved yet.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
